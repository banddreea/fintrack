<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summary — FinTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="app-body">
    <div class="shell">
      <nav class="topnav">
        <div class="nav-brand">
          <img th:src="@{/images/logo.png}" alt="FinTrack" class="nav-logo" />
          <span class="nav-brand-name">FinTrack</span>
        </div>

        <div class="nav-links">
          <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
          <a th:href="@{/transactions}" class="nav-link">Transactions</a>
          <a th:href="@{/summary}" class="nav-link active">Summary</a>
        </div>

        <div class="nav-user">
          <div
            class="nav-avatar"
            th:text="${#authentication.name.substring(0,1).toUpperCase()}"
          >
            U
          </div>
          <span class="nav-username" th:text="${#authentication.name}"
            >username</span
          >
          <form method="post" th:action="@{/logout}">
            <button type="submit" class="nav-logout">Sign out</button>
          </form>
        </div>
      </nav>

      <div class="content">
        <div class="page-title">Monthly summary</div>

        <div class="sum-list">
          <p
            th:if="${#lists.isEmpty(summaries)}"
            style="font-size: 13px; color: #888; padding: 20px 0"
          >
            No transactions yet.
          </p>

          <div th:each="s : ${summaries}" class="sum-card">
            <div class="sum-info">
              <p class="sum-month" th:text="${s.monthName}">Month Year</p>

              <div class="sum-row">
                <span>Income</span>
                <span
                  class="income"
                  th:text="${'+$' + #numbers.formatDecimal(s.totalIncome, 1, 'COMMA', 2, 'POINT')}"
                  >+$0.00</span
                >
              </div>

              <div class="sum-row">
                <span>Expenses</span>
                <span
                  class="expense"
                  th:text="${'-$' + #numbers.formatDecimal(s.totalExpense, 1, 'COMMA', 2, 'POINT')}"
                  >-$0.00</span
                >
              </div>

              <div class="sum-net">
                <span>Net</span>
                <span
                  th:classappend="${s.net >= 0} ? ' income' : ' expense'"
                  th:text="${(s.net >= 0 ? '+' : '') + '$' + #numbers.formatDecimal(s.net, 1, 'COMMA', 2, 'POINT')}"
                  >$0.00</span
                >
              </div>

              <a
                th:href="@{/summary/details(month=${s.month}, year=${s.year})}"
                class="link-small"
                style="margin-top: 10px; display: inline-block"
              >
                View transactions →
              </a>
            </div>

            <div class="sum-chart-wrap">
              <canvas
                class="sum-chart"
                th:attr="data-income=${s.totalIncome}, data-expense=${s.totalExpense}"
              >
              </canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script>
      document.querySelectorAll(".sum-chart").forEach((canvas) => {
        const income = parseFloat(canvas.dataset.income);
        const expense = parseFloat(canvas.dataset.expense);
        new Chart(canvas.getContext("2d"), {
          type: "doughnut",
          data: {
            labels: ["Income", "Expenses"],
            datasets: [
              {
                data: [income, expense],
                backgroundColor: ["#dcfce7", "#fee2e2"],
                borderColor: ["#16a34a", "#dc2626"],
                borderWidth: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                position: "bottom",
                labels: { font: { size: 11 }, boxWidth: 10, padding: 10 },
              },
            },
          },
        });
      });
    </script>
  </body>
</html>
