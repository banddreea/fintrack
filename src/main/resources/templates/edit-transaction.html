<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit transaction — FinTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body class="app-body">
    <div class="shell">
      <nav class="topnav">
        <div class="nav-brand">
          <img
            th:src="@{/images/logo.png}"
            alt="FinTrack logo"
            class="nav-logo"
          />
          <span class="nav-brand-name">FinTrack</span>
        </div>

        <div class="nav-links">
          <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
          <a th:href="@{/transactions}" class="nav-link active">Transactions</a>
          <a th:href="@{/summary}" class="nav-link">Summary</a>
        </div>

        <div class="nav-user">
          <div
            class="nav-avatar"
            th:text="${#authentication.name.substring(0,1).toUpperCase()}"
          >
            U
          </div>
          <span class="nav-username" th:text="${#authentication.name}"
            >username</span
          >
          <form method="post" th:action="@{/logout}">
            <button type="submit" class="nav-logout">Sign out</button>
          </form>
        </div>
      </nav>

      <div class="content">
        <div class="page-title">Edit transaction</div>

        <div class="card">
          <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
          <form
            method="post"
            th:action="@{/transactions/edit/{id}(id=${transaction.id})}"
          >
            <input type="hidden" name="redirect" th:value="${param.redirect}" />
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Description</label>
                <input
                  type="text"
                  name="description"
                  class="form-input"
                  th:value="${transaction.description}"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Amount</label>
                <input
                  type="number"
                  name="amount"
                  step="0.01"
                  class="form-input"
                  th:value="${transaction.amount}"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Type</label>
                <select name="type" class="form-input">
                  <option
                    value="INCOME"
                    th:selected="${transaction.type == 'INCOME'}"
                  >
                    Income
                  </option>
                  <option
                    value="EXPENSE"
                    th:selected="${transaction.type == 'EXPENSE'}"
                  >
                    Expense
                  </option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Date</label>
                <input
                  type="date"
                  name="date"
                  class="form-input"
                  th:value="${transaction.date}"
                  required
                />
              </div>
            </div>

            <div style="display: flex; gap: 12px; align-items: center">
              <button type="submit" class="btn-primary">Save changes</button>
              <a th:href="@{/transactions}" class="link">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
