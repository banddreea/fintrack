<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — FinTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body class="auth-body">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">
          <img
            th:src="@{/images/logo.png}"
            alt="FinTrack logo"
            class="auth-logo-img"
          />
          <span class="auth-logo-name">FinTrack</span>
        </div>

        <h2 class="auth-title">Welcome back!</h2>
        <p class="auth-sub">Sign in to your account</p>

        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <p
          th:if="${message}"
          class="alert alert-success"
          th:text="${message}"
        ></p>

        <form method="post" th:action="@{/login}">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              name="password"
              class="form-input"
              required
            />
          </div>

          <button type="submit" class="btn-primary btn-full">Sign in</button>
        </form>

        <p class="auth-switch">
          No account?
          <a th:href="@{/register}" class="link">Register</a>
        </p>

        <div class="demo">
          <p>Try the demo account</p>
          <p>
            <strong>username:</strong> demo &nbsp;
            <strong>password:</strong> demo1234
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
