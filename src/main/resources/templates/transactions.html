<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions — FinTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body class="app-body">
    <div class="shell">
      <nav class="topnav">
        <div class="nav-brand">
          <img th:src="@{/images/logo.png}" alt="FinTrack" class="nav-logo" />
          <span class="nav-brand-name">FinTrack</span>
        </div>

        <div class="nav-links">
          <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
          <a th:href="@{/transactions}" class="nav-link active">Transactions</a>
          <a th:href="@{/summary}" class="nav-link">Summary</a>
        </div>

        <div class="nav-user">
          <div
            class="nav-avatar"
            th:text="${#authentication.name.substring(0,1).toUpperCase()}"
          >
            U
          </div>
          <span class="nav-username" th:text="${#authentication.name}"
            >username</span
          >
          <form method="post" th:action="@{/logout}">
            <button type="submit" class="nav-logout">Sign out</button>
          </form>
        </div>
      </nav>

      <div class="content">
        <div class="page-title">Transactions</div>

        <div class="card">
          <p class="card-title">Add transaction</p>
          <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>

          <form method="post" th:action="@{/transactions/add}">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Description</label>
                <input
                  type="text"
                  name="description"
                  class="form-input"
                  placeholder="e.g. Rent"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Amount</label>
                <input
                  type="number"
                  name="amount"
                  step="0.01"
                  class="form-input"
                  placeholder="0.00"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Type</label>
                <select name="type" class="form-input">
                  <option value="INCOME">Income</option>
                  <option value="EXPENSE">Expense</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-input" required />
              </div>
            </div>

            <button type="submit" class="btn-primary">Add transaction</button>
          </form>
        </div>

        <p class="card-sub">All transactions</p>

        <div class="tx-list">
          <div th:if="${#lists.isEmpty(transactions)}" class="empty-row">
            No transactions yet
          </div>

          <div
            class="tx-item"
            th:each="t : ${transactions}"
            th:classappend="${t.type == 'INCOME'} ? ' tx-income' : ' tx-expense'"
          >
            <div class="tx-left">
              <p class="tx-title" th:text="${t.description}">Description</p>
              <p class="tx-date" th:text="${t.date}">2026-03-15</p>
            </div>

            <div class="tx-right">
              <span
                class="tx-badge"
                th:text="${t.type}"
                th:classappend="${t.type == 'INCOME'} ? ' badge-in' : ' badge-ex'"
                >TYPE
              </span>

              <span
                class="tx-amount"
                th:classappend="${t.type == 'INCOME'} ? ' income' : ' expense'"
                th:text="${(t.type == 'INCOME' ? '+' : '-') +
                             '$' + #numbers.formatDecimal(t.amount, 1, 'COMMA', 2, 'POINT')}"
                >$0.00
              </span>
            </div>

            <div class="tx-actions">
              <a th:href="@{/transactions/edit/{id}(id=${t.id})}">Edit</a>

              <form
                method="post"
                th:action="@{/transactions/delete/{id}(id=${t.id})}"
              >
                <button
                  type="submit"
                  onclick="
                    event.stopPropagation();
                    return confirm('Delete this transaction?');
                  "
                >
                  Delete
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="pagination">
          <a
            th:if="${currentPage > 0}"
            th:href="@{/transactions(page=${currentPage - 1})}"
            >Previous</a
          >

          <span th:text="${currentPage + 1}">1</span> /
          <span th:text="${totalPages}">1</span>

          <a
            th:if="${currentPage + 1 < totalPages}"
            th:href="@{/transactions(page=${currentPage + 1})}"
            >Next</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
